<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Brand</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
    }

    header {
      background: black;
      color: white;
      padding: 15px;
      text-align: center;
    }

    nav {
      display: flex;
      justify-content: center;
      background: #333;
    }

    nav a {
      color: white;
      padding: 14px 20px;
      text-decoration: none;
    }

    nav a:hover {
      background: #555;
    }

    .hero {
      text-align: center;
      padding: 60px 20px;
      background: white;
    }

    .hero h1 {
      margin-bottom: 10px;
    }

    .products {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 40px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      padding: 20px;
      width: 200px;
      text-align: center;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    footer {
      text-align: center;
      padding: 20px;
      background: black;
      color: white;
    }
  </style>
</head>

<body>

<header>
  <h2>My Brand</h2>
</header>

<nav>
  <a href="#">Home</a>
  <a href="#">Products</a>
  <a href="#">Contact</a>
</nav>

<section class="hero">
  <h1>Welcome to My Store</h1>
  <p>Simple. Clean. Powerful.</p>
</section>

<section class="products">
  <div class="card">
    <h3>Product 1</h3>
    <p>$10</p>
  </div>

  <div class="card">
    <h3>Product 2</h3>
    <p>$15</p>
  </div>

  <div class="card">
    <h3>Product 3</h3>
    <p>$20</p>
  </div>
</section>

<footer>
  <p>© 2026 My Brand</p>
</footer>

</body>
</html>
